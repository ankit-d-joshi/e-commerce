# A Secret and a ConfigMap (next file) are structurally almost identical — both are just
# key/value bags a Pod can consume as environment variables or mounted files. The
# difference: a Secret's values are stored base64-ENCODED (not encrypted — encoding is
# trivially reversible by anyone, `echo <value> | base64 -d`) and the API server treats
# Secret objects with slightly more care than ConfigMaps (e.g. excluded from some default
# `kubectl describe` output, held only in memory on nodes where possible). Genuine
# encryption-at-rest, and tighter access control via RBAC, is real production practice but
# explicitly out of scope until Step 12 — don't mistake "it's called Secret" for "it's
# safe," here or in real clusters without that extra hardening layered on.
#
# This ONE Secret is shared by both workloads below, mirroring how docker-compose.yml kept
# POSTGRES_USER/POSTGRES_PASSWORD and SPRING_DATASOURCE_USERNAME/_PASSWORD in sync by hand:
#   - the postgres Deployment reads it to create this exact user/password on first startup
#   - the product-catalog Deployment reads the SAME keys to authenticate its JDBC connection
# One source of truth for the credential pair, instead of two Secrets that could drift.
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: ecommerce
# `stringData` accepts plain, human-readable strings in this YAML file — the API server
# base64-encodes them itself when the object is stored. The alternative field, `data`,
# requires values to ALREADY be base64-encoded by hand before they're pasted in here. Both
# produce an identical stored object; stringData is used purely so this file stays
# readable instead of full of unreadable base64 blobs.
stringData:
  # Matches docker-compose.yml's POSTGRES_USER / SPRING_DATASOURCE_USERNAME fallback value
  # (application.yml's ${SPRING_DATASOURCE_USERNAME:catalog}), kept identical on purpose so
  # nothing about the app's own config needs to change to run under Kubernetes.
  username: catalog
  password: catalog
