# Application configuration for the Product Catalog service.
#
# The datasource block below is externalized via environment variables (Step 2), each with
# a `localhost` fallback so the exact same jar works two ways with zero code/config changes:
#   - Run bare (`./mvnw spring-boot:run`, or an IDE run configuration) with no env vars set
#     -> falls back to localhost:5432, matching a manually-started Postgres container.
#   - Run inside Docker Compose (see docker-compose.yml) -> Compose injects
#     SPRING_DATASOURCE_URL etc. pointing at the `postgres` service-name instead of
#     localhost, since "localhost" inside the product-catalog container would mean the
#     container itself, not the separate Postgres container next to it.
# A real deployment (Step 3+) would source these same env vars from a Kubernetes
# ConfigMap+Secret rather than Compose — the placeholder mechanism here is exactly what
# makes that swap possible later without touching this file again.

spring:
  application:
    name: product-catalog

  datasource:
    # ${VAR:default} is Spring's property placeholder syntax: at startup, Spring checks
    # the environment (and other property sources) for VAR; if it's not set, it falls back
    # to the value after the colon. This is "relaxed binding" made explicit and
    # self-documenting, rather than relying silently on Spring Boot's implicit
    # SPRING_DATASOURCE_URL -> spring.datasource.url env-var mapping with no default shown
    # here at all.
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/product_catalog}
    username: ${SPRING_DATASOURCE_USERNAME:catalog}
    password: ${SPRING_DATASOURCE_PASSWORD:catalog}

  jpa:
    hibernate:
      # IMPORTANT: "validate", never "update" or "create". Hibernate reads the schema
      # Flyway has already built and fails fast at startup if the @Entity mappings don't
      # match it. Flyway migrations are the single source of truth for schema; Hibernate
      # is never allowed to mutate the schema itself. This is the industry-standard split
      # of responsibilities between an ORM and a migration tool.
      ddl-auto: validate
    # Log a warning (rather than silently truncate/behave oddly) if a query result set is
    # opened without an explicit transaction boundary. Cheap safety net during learning.
    open-in-view: false

  flyway:
    # Enabled by default once flyway-core is on the classpath; listed explicitly here so
    # the config is self-documenting rather than relying on an implicit default.
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

# Actuator configuration (Step 3). We expose the bare minimum needed for Kubernetes
# liveness/readiness probes and nothing else — metrics/Prometheus scraping is deferred to
# Step 4, so the full breadth of what Actuator *can* do stays out of scope until then.
management:
  endpoints:
    web:
      exposure:
        # Spring Boot's own default already restricts exposed endpoints to just "health" —
        # writing it explicitly documents that boundary in this file rather than relying on
        # an implicit default the reader can't see, same pattern as spring.flyway.enabled
        # above.
        include: health
  endpoint:
    health:
      probes:
        # Publishes /actuator/health/liveness and /actuator/health/readiness as separate
        # sub-endpoints (instead of one combined /actuator/health). Spring Boot
        # auto-detects a Kubernetes environment and enables this itself, but pinning it
        # explicitly means the same endpoints exist when running bare/locally too, so
        # behavior doesn't silently differ between "on my laptop" and "in the cluster".
        enabled: true
      group:
        # LIVENESS answers "is this JVM/process itself broken and should Kubernetes kill
        # and restart the pod?" We include ONLY Spring's own internal livenessState signal
        # (has the application context finished starting without entering a broken state)
        # — deliberately NOT the database. A Postgres outage doesn't mean this JVM is
        # broken; restarting the pod wouldn't fix the database and would just add restart
        # churn on top of an already-degraded dependency.
        liveness:
          include: livenessState
        # READINESS answers "can THIS pod usefully serve traffic right now?" We include
        # both readinessState (Spring's own internal signal, separate from livenessState —
        # this one flips to "refusing traffic" not just on startup failure, but also during
        # graceful shutdown: when the app receives SIGTERM, Spring flips it to REFUSING_
        # TRAFFIC FIRST, before the context actually closes, so Kubernetes stops sending new
        # requests while in-flight ones finish — no dropped connections) and "db" (Actuator's
        # built-in DataSource health indicator, auto-configured because
        # spring-boot-starter-data-jpa is on the classpath) — if
        # the database is unreachable, this pod genuinely can't serve /api/products
        # correctly, so Kubernetes should stop routing traffic to it (drop it from the
        # Service's endpoints) WITHOUT killing the pod. The instant the DB recovers, the
        # next readiness check flips back to UP and traffic resumes automatically, with no
        # restart involved.
        readiness:
          include: readinessState,db
