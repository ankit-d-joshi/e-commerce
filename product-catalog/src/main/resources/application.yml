# Application configuration for the Product Catalog service.
#
# The datasource block below is externalized via environment variables (Step 2), each with
# a `localhost` fallback so the exact same jar works two ways with zero code/config changes:
#   - Run bare (`./mvnw spring-boot:run`, or an IDE run configuration) with no env vars set
#     -> falls back to localhost:5432, matching a manually-started Postgres container.
#   - Run inside Docker Compose (see docker-compose.yml) -> Compose injects
#     SPRING_DATASOURCE_URL etc. pointing at the `postgres` service-name instead of
#     localhost, since "localhost" inside the product-catalog container would mean the
#     container itself, not the separate Postgres container next to it.
# A real deployment (Step 3+) would source these same env vars from a Kubernetes
# ConfigMap+Secret rather than Compose — the placeholder mechanism here is exactly what
# makes that swap possible later without touching this file again.

spring:
  application:
    name: product-catalog

  datasource:
    # ${VAR:default} is Spring's property placeholder syntax: at startup, Spring checks
    # the environment (and other property sources) for VAR; if it's not set, it falls back
    # to the value after the colon. This is "relaxed binding" made explicit and
    # self-documenting, rather than relying silently on Spring Boot's implicit
    # SPRING_DATASOURCE_URL -> spring.datasource.url env-var mapping with no default shown
    # here at all.
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/product_catalog}
    username: ${SPRING_DATASOURCE_USERNAME:catalog}
    password: ${SPRING_DATASOURCE_PASSWORD:catalog}

  jpa:
    hibernate:
      # IMPORTANT: "validate", never "update" or "create". Hibernate reads the schema
      # Flyway has already built and fails fast at startup if the @Entity mappings don't
      # match it. Flyway migrations are the single source of truth for schema; Hibernate
      # is never allowed to mutate the schema itself. This is the industry-standard split
      # of responsibilities between an ORM and a migration tool.
      ddl-auto: validate
    # Log a warning (rather than silently truncate/behave oddly) if a query result set is
    # opened without an explicit transaction boundary. Cheap safety net during learning.
    open-in-view: false

  flyway:
    # Enabled by default once flyway-core is on the classpath; listed explicitly here so
    # the config is self-documenting rather than relying on an implicit default.
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080
